server {
  listen 80;
  listen [::]:80;
  server_name flowcheck-api.3rdplaces.io;

  access_log /var/log/nginx/flowcheck-api.access.log main;
  error_log  /var/log/nginx/flowcheck-api.error.log;

  location ^~ /health {
    proxy_pass         http://127.0.0.1:8052/health;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 10;
  }

  location ^~ /docs {
    proxy_pass         http://127.0.0.1:8052/docs;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_read_timeout 30;
  }

  location ^~ /openapi.json {
    proxy_pass         http://127.0.0.1:8052/openapi.json;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_read_timeout 10;
  }

  location / {
    proxy_pass         http://127.0.0.1:8052;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60;
  }
}
